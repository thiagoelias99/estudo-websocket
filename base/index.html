<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WS Live Test</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #121212;
      color: #eee;
    }

    #log {
      background: #000;
      padding: 10px;
      height: 300px;
      overflow-y: scroll;
      border: 1px solid #333;
    }

    .status-on {
      color: #0f0;
    }

    .status-off {
      color: #f00;
    }
  </style>
</head>

<body>
  <h1>WebSocket Live Test</h1>
  <p id="status" class="status-off">Connecting...</p>
  <form id="message-form">
    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required />
    <button type="submit">Send</button>
  </form>
  <h3>Message Log:</h3>
  <pre id="log"></pre>
</body>

<script>
  const statusEl = document.getElementById('status')
  const log = document.getElementById('log')
  const form = document.getElementById('message-form')
  const input = document.getElementById('message-input')

  // Initiate the handshake with the WebSocket server
  const socket = new WebSocket('ws://localhost:8080')

  function appendLog(label, message) {
    const entry = `[${new Date().toLocaleTimeString()}] ${label}: ${message}\n`
    log.textContent += entry
  }

  socket.addEventListener('open', () => {
    statusEl.textContent = 'Connected'
    statusEl.classList.remove('status-off')
    statusEl.classList.add('status-on')
    appendLog('[SYSTEM]', 'WebSocket connection established.')
  })

  socket.addEventListener('close', (event) => {
    appendLog('[SYSTEM]', 'WebSocket connection closed.')
    statusEl.textContent = 'Disconnected'
    statusEl.classList.remove('status-on')
    statusEl.classList.add('status-off')
  })

  socket.addEventListener('message', (event) => {
    appendLog('[RECEIVED]', event.data)
  })

  document.getElementById('message-form').addEventListener('submit', (event) => {
    event.preventDefault()

    if (socket.readyState === WebSocket.OPEN) {
      const message = input.value.trim()
      socket.send(message)
      appendLog('[SENT]', message)
      input.value = ''
    } else {
      appendLog('[ERROR]', 'WebSocket is not open. Unable to send message.')
    }
  })
</script>

</html>
